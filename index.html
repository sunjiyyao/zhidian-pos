<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D9488">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>">
  <title>智店铺 · 进销存</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ===== 顶部导航 ===== -->
  <header class="topbar" id="topbar">
    <div class="topbar-left">
      <button class="icon-btn back-btn hidden" id="backBtn" onclick="App.goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </div>
    <h1 class="topbar-title" id="topbarTitle">智店铺</h1>
    <div class="topbar-right" id="topbarRight"></div>
  </header>

  <!-- ===== 主内容区 ===== -->
  <main class="main-content" id="mainContent">
    <!-- 页面容器由 JS 动态填充 -->
  </main>

  <!-- ===== 底部 Tab ===== -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="tab-item active" data-tab="home" onclick="App.switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>首页</span>
    </button>
    <button class="tab-item" data-tab="products" onclick="App.switchTab('products')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      <span>商品</span>
    </button>
    <button class="tab-item" data-tab="customers" onclick="App.switchTab('customers')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      <span>客户</span>
    </button>
    <button class="tab-item" data-tab="inventory" onclick="App.switchTab('inventory')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
      <span>库存</span>
    </button>
    <button class="tab-item" data-tab="orders" onclick="App.switchTab('orders')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
      <span>订单</span>
    </button>
  </nav>

  <!-- ===== Modal / BottomSheet ===== -->
  <div class="modal-overlay hidden" id="modalOverlay" onclick="App.closeModal(event)">
    <div class="bottom-sheet" id="bottomSheet" onclick="event.stopPropagation()">
      <div class="sheet-handle" onclick="App.closeModal()"></div>
      <div class="sheet-header" id="sheetHeader">
        <h2 class="sheet-title" id="sheetTitle">新建</h2>
        <button class="icon-btn close-btn" onclick="App.closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="sheet-body" id="sheetBody"></div>
      <div class="sheet-footer" id="sheetFooter"></div>
    </div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast hidden" id="toast"></div>

  <!-- ===== Scripts ===== -->
  <script src="db.js"></script>
  <script src="bluetooth.js"></script>
  <script src="print.js"></script>
  <script src="app.js"></script>
  <!-- ===== Service Worker ===== -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('SW registered:', reg.scope);
      }).catch(err => {
        console.log('SW registration failed:', err);
      });
    }
  </script>
</body>
</html>
